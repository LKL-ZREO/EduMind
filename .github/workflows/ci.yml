name: CI — Quality Gate

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
jobs:
  # ==================== 后端测试 ====================
  backend-test:
    name: Backend — Java ${{ matrix.java }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [21]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('edumind/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build & Test
        run: |
          cd edumind
          chmod +x mvnw
          ./mvnw verify -Dspring.profiles.active=test \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/postgres \
            -Dspring.datasource.username=postgres \
            -Dspring.datasource.password=postgres \
            -Dspring.flyway.enabled=false \
            -Djwt.secret=ci-test-secret-key-must-be-at-least-256-bits-for-jjwt!! \
            --batch-mode
        env:
          OPENCLAW_API_KEY: ci-test-key
          MCP_API_KEY: ci-test-key

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: edumind/target/site/jacoco/
          retention-days: 7

  # ==================== 前端测试 ====================
  frontend-test:
    name: Frontend — Node.js ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: vue-project/package-lock.json

      - name: Install dependencies
        run: cd vue-project && npm ci

      - name: Type check
        run: cd vue-project && npx vue-tsc --build

      - name: Lint
        run: cd vue-project && npm run lint

      - name: Run tests
        run: cd vue-project && npx vitest run

  # ==================== Docker Build (sanity check) ====================
  docker-build:
    name: Docker — Build image
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: |
          cd edumind
          chmod +x mvnw
          ./mvnw package -DskipTests --batch-mode

      - name: Build Docker image
        run: cd edumind && docker build -t edumind:ci-test .

      - name: Verify image
        run: docker images edumind:ci-test
