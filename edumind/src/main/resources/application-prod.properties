# ==================== 生产环境配置 ====================
# 启动方式: --spring.profiles.active=prod

# 关闭 Swagger
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
knife4j.enable=false

# 关闭 SQL 日志
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.nologging.NoLoggingImpl

# 安全日志
logging.level.org.springframework.security=WARN
logging.level.com.firedemo=INFO

# 生产限流收紧
rate-limit.anonymous-default.capacity=15
rate-limit.anonymous-default.refill-per-minute=10
rate-limit.authenticated-default.capacity=30
rate-limit.authenticated-default.refill-per-minute=20

# 生产环境熔断更敏感：20s 快速恢复试探
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=40

# 文件存储：生产环境使用 S3（阿里云 OSS S3 兼容端点 / MinIO / AWS S3）
storage.type=${STORAGE_TYPE:s3}

# Actuator 仅暴露 health，不暴露详细信息
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
