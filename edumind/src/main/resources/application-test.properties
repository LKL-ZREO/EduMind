# ==================== 测试 Profile 配置 ====================
# 用于 Spring Boot 集成测试，禁用/覆盖生产依赖

spring.application.name=edumind-test

# ==================== 数据源 — 由 Testcontainers / BaseIntegrationTest 动态注入 ====================
# 不在此处写死连接信息，由 @DynamicPropertySource 在运行时注入

# ==================== Flyway — 测试环境禁用 ====================
# 表结构由 MyBatis-Plus 自动建表，或由 Testcontainers 初始化
spring.flyway.enabled=false

# ==================== MyBatis-Plus — 测试环境打印 SQL ====================
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ==================== 文件上传 — 使用临时目录 ====================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=52MB
storage.type=local
storage.upload-dir=${java.io.tmpdir}/edumind-test-uploads

# ==================== JWT — 测试用固定密钥 ====================
jwt.secret=test-secret-key-for-unit-tests-only-must-be-at-least-256-bits-long!!

# ==================== PII 加密 — 测试用固定密钥 ====================
app.encrypt.aes-key=VEVTVF9FTkNSWVBUSU9OX0tFWV9GT1JfVU5JVF9URVNUU19PTkxZX0FUX0xFQVNUXzMyX0JZVEVT

# ==================== 外部服务 — 测试环境全部禁用/Mock ====================
# OpenClaw
langchain4j.openai.base-url=http://localhost:9999/v1
langchain4j.openai.api-key=test-api-key
langchain4j.openai.temperature=0.0
langchain4j.openai.timeout=5s

# MinerU
mineru.enabled=false

# Vision PDF
vision-pdf.api-key=

# OneBot
onebot.http.url=http://localhost:9999
onebot.http.token=test-token

# MCP
mcp.api-key=test-mcp-key

# S3
storage.s3.endpoint=
storage.s3.bucket=test-bucket
storage.s3.access-key=test
storage.s3.secret-key=test

# Redis — 由 Testcontainers 动态注入或使用内嵌
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ==================== 虚拟线程 — 测试环境关闭 ====================
spring.threads.virtual.enabled=false

# ==================== AI 模型目录 ====================
app.ai.reranker.model-dir=${java.io.tmpdir}/edumind-test-models

# ==================== Actuator ====================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# ==================== Resilience4j — 测试环境关闭熔断 ====================
resilience4j.circuitbreaker.instances.openclaw.sliding-window-size=100
resilience4j.circuitbreaker.instances.openclaw.failure-rate-threshold=100
resilience4j.circuitbreaker.instances.openclaw.minimum-number-of-calls=100
