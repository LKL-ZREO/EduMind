
spring.application.name=edumind
server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev,local}

# ==================== PostgreSQL ====================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/postgres
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS}

spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration


# ==================== MyBatis-Plus ====================
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.type-aliases-package=com.firedemo.demo.Entity

# ==================== JWT ====================

jwt.secret=${JWT_SECRET}

# ==================== PII 加密 ====================
# AES-256-GCM 密钥，Base64 编码（至少 32 字节）。生产环境务必通过环境变量覆盖！
# 生成命令：openssl rand -base64 32
app.encrypt.aes-key=${ENCRYPT_AES_KEY:REVMT1lfREVWRUxPUE1FTlRfS0VZX0RPTl9OT1RfVVNFX0lOX1BST0RVQ1RJT04=}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=52MB

# ==================== OpenClaw Gateway ====================
langchain4j.openai.base-url=${OPENCLAW_BASE_URL:http://localhost:18789/v1}
langchain4j.openai.api-key=${OPENCLAW_API_KEY}
langchain4j.openai.temperature=0.2
langchain4j.openai.timeout=300s


openclaw.agent.default=jarvis
openclaw.agent.mapping.1=jarvis
openclaw.agent.mapping.2=main


mcp.api-key=${MCP_API_KEY}


spring.threads.virtual.enabled=true
spring.mvc.async.request-timeout=300000

# ==================== Redis ====================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=0


storage.type=${STORAGE_TYPE:local}
storage.upload-dir=${user.home}/.homework-grader/uploads


storage.s3.endpoint=${S3_ENDPOINT:}
storage.s3.region=${S3_REGION:us-east-1}
storage.s3.bucket=${S3_BUCKET:}
storage.s3.access-key=${S3_ACCESS_KEY:}
storage.s3.secret-key=${S3_SECRET_KEY:}
storage.s3.path-style-enabled=${S3_PATH_STYLE:true}


app.ai.reranker.model-dir=${AI_MODEL_DIR:}


springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
knife4j.enable=true


rate-limit.anonymous-default.capacity=30
rate-limit.anonymous-default.refill-per-minute=20
rate-limit.authenticated-default.capacity=60
rate-limit.authenticated-default.refill-per-minute=40
# 认证接口限流 — 防暴力破解（令牌桶网关层）
rate-limit.rules[/api/auth/].capacity=10
rate-limit.rules[/api/auth/].refill-per-minute=5
rate-limit.rules[/api/homework/submit].capacity=5
rate-limit.rules[/api/homework/submit].refill-per-minute=3
rate-limit.rules[/api/dashboard/].capacity=60
rate-limit.rules[/api/dashboard/].refill-per-minute=30
rate-limit.rules[/api/rag/].capacity=30
rate-limit.rules[/api/rag/].refill-per-minute=15
rate-limit.rules[/api/chat/].capacity=40
rate-limit.rules[/api/chat/].refill-per-minute=20

# ==================== OneBot (QQ Bot) ====================
onebot.http.url=${ONEBOT_HTTP_URL:http://127.0.0.1:3000}
onebot.http.token=${ONEBOT_TOKEN}


server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s


# ==================== Actuator + Observability ====================
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=true

# Metrics 导出
management.metrics.export.prometheus.enabled=true
management.metrics.export.prometheus.step=30s
management.metrics.export.prometheus.descriptions=true

# 指标分发（按端点 URI、HTTP 方法、响应状态聚合）
management.metrics.web.server.request.autotime.enabled=true
management.metrics.web.server.request.autotime.percentiles=0.5,0.95,0.99
management.metrics.web.server.request.autotime.percentiles-histogram=true

# 分发指标到 common-tags（所有指标自动携带此标签）
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.env=${SPRING_PROFILES_ACTIVE:dev}

# 按指标名分发（可按需调整）
management.metrics.enable.jvm=true
management.metrics.enable.logback=true
management.metrics.enable.process=true
management.metrics.enable.system=true
management.metrics.enable.executor=true
management.metrics.enable.tomcat=true

# 连接池指标
management.metrics.enable.jdbc=true

# HikariCP 指标
management.metrics.enable.hikaricp=true


resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.openclaw.base-config=default

resilience4j.circuitbreaker.instances.openclaw.event-consumer-buffer-size=100
