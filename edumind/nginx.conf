worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Gzip 压缩
    gzip on;
    gzip_types application/json text/plain text/css application/javascript text/javascript;
    gzip_min_length 512;

    # 自定义访问日志格式（含 Request ID 和响应时间）
    log_format trace '$remote_addr - [$time_local] "$request" '
                     '$status $body_bytes_sent '
                     '"$http_x_request_id" '
                     'rt=$request_time uct="$upstream_connect_time" '
                     'uht="$upstream_header_time"';

    # Docker DNS resolver（nginx 需要动态解析 app 服务的多副本 IP）
    resolver 127.0.0.11 valid=30s ipv6=off;

    # 上游：Spring Boot 应用（多副本负载均衡）
    # Docker Compose 中 app 服务名会自动 DNS 轮询解析到所有副本
    upstream backend {
        server app:8080 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name localhost;

        # 使用自定义日志格式，携带 Request ID 与各段耗时
        access_log /var/log/nginx/access.log trace;

        # ==================== 安全头 ====================
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ==================== Nginx 自身健康检查 ====================
        location = /health {
            access_log off;
            return 200 "OK";
        }

        # ==================== 后端 API ====================
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # 超时：AI 批改可能耗时较长
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
        }

        # ==================== Actuator 健康检查 ====================
        location /actuator/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            # 仅允许内网访问（可加 IP 白名单）
            allow 127.0.0.0/8;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny all;
        }

        # ==================== 前端 VUE3 ====================
        # 开发环境：反代到 Vite dev server
        # 生产环境：应改为 serve 构建产物目录
        location / {
            proxy_pass http://host.docker.internal:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_buffering off;
        }
    }
}
