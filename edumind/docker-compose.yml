version: '3.8'

services:
  # ======================== PostgreSQL ========================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: firedemo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:?请设置 DB_PASS 环境变量或创建 .env 文件}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ======================== Redis（AOF 持久化） ========================
  redis:
    image: redis:7-alpine
    container_name: firedemo-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --save 900 1
      --save 300 10
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ======================== PostgreSQL 自动备份 ========================
  pgbackup:
    image: postgres:16-alpine
    container_name: firedemo-pgbackup
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGUSER: ${DB_USER:-postgres}
      PGPASSWORD: ${DB_PASS:?请设置 DB_PASS 环境变量或创建 .env 文件}
    volumes:
      - pgbackups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "0 3 * * * /backup.sh" > /var/spool/cron/crontabs/root
        crond -f -l 2
    depends_on:
      postgres:
        condition: service_healthy

  # ======================== MinIO 对象存储（S3 兼容，开发/生产通用） ========================
  minio:
    image: minio/minio:latest
    container_name: firedemo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web 控制台
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ======================== Spring Boot 应用（可水平扩展） ========================
  # 注意：不设 container_name、不映射 host 端口，以便 --scale 多副本
  app:
    build: .
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      # 生产模式，不加载 application-local.properties（避免 baseline 跳过 V1）
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS:?请设置 DB_PASS 环境变量或创建 .env 文件}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # JWT / MCP（必填，建议在 .env 中配置）
      JWT_SECRET: ${JWT_SECRET:?请设置 JWT_SECRET 环境变量}
      MCP_API_KEY: ${MCP_API_KEY:-change-me}
      LANGCHAIN4J_OPENAI_BASE_URL: http://host.docker.internal:18789/v1
      LANGCHAIN4J_OPENAI_API_KEY: ${OPENCLAW_API_KEY:?请设置 OPENCLAW_API_KEY 环境变量}
      ONEBOT_HTTP_URL: http://host.docker.internal:3000
      ONEBOT_HTTP_TOKEN: ${ONEBOT_TOKEN:-change-me}
      # Reranker 模型目录（可选，未安装 ONNX 模型时自动回退）
      AI_MODEL_DIR: ${AI_MODEL_DIR:-/app/models}
      # 日志输出目录
      LOG_DIR: /root/.edumind/logs
      # S3 对象存储（local=本地磁盘，s3=MinIO/OSS/COS）
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-homework-files}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_PATH_STYLE: ${S3_PATH_STYLE:-true}
    volumes:
      - uploads:/root/.homework-grader/uploads
      - djl_models:/root/.djl
      - logs:/root/.edumind/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ======================== Nginx 反向代理 + 负载均衡 ========================
  nginx:
    image: nginx:1.25-alpine
    container_name: firedemo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ======================== Prometheus 指标采集 ========================
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: firedemo-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ======================== Grafana 指标可视化 ========================
  grafana:
    image: grafana/grafana:11.2.0
    container_name: firedemo-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  redis_data:
  pgbackups:
  minio_data:
  uploads:
  djl_models:
  logs:
  prometheus_data:
  grafana_data:
