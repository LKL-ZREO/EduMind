version: '3.8'

services:
  # ======================== PostgreSQL ========================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: firedemo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:?请设置 DB_PASS 环境变量或创建 .env 文件}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ======================== Redis（AOF 持久化） ========================
  redis:
    image: redis:7-alpine
    container_name: firedemo-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --save 900 1
      --save 300 10
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ======================== PostgreSQL 自动备份 ========================
  pgbackup:
    image: postgres:16-alpine
    container_name: firedemo-pgbackup
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGUSER: ${DB_USER:-postgres}
      PGPASSWORD: ${DB_PASS:?请设置 DB_PASS 环境变量或创建 .env 文件}
    volumes:
      - pgbackups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "0 3 * * * /backup.sh" > /var/spool/cron/crontabs/root
        crond -f -l 2
    depends_on:
      postgres:
        condition: service_healthy

  # ======================== MinIO 对象存储（S3 兼容，开发/生产通用） ========================
  minio:
    image: minio/minio:latest
    container_name: firedemo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web 控制台
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ======================== Spring Boot 应用（可水平扩展） ========================
  # 注意：不设 container_name、不映射 host 端口，以便 --scale 多副本
  app:
    build: .
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS:?请设置 DB_PASS 环境变量或创建 .env 文件}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      LANGCHAIN4J_OPENAI_BASE_URL: http://host.docker.internal:18789/v1
      LANGCHAIN4J_OPENAI_API_KEY: ${OPENCLAW_API_KEY}
      ONEBOT_HTTP_URL: http://host.docker.internal:3000
      ONEBOT_HTTP_TOKEN: ${ONEBOT_TOKEN}
      # S3 对象存储（local=本地磁盘，s3=MinIO/OSS/COS）
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-homework-files}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_PATH_STYLE: ${S3_PATH_STYLE:-true}
    volumes:
      - uploads:/root/.homework-grader/uploads
      - djl_models:/root/.djl
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ======================== Nginx 反向代理 + 负载均衡 ========================
  nginx:
    image: nginx:1.25-alpine
    container_name: firedemo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
  redis_data:
  pgbackups:
  minio_data:
  uploads:
  djl_models:
