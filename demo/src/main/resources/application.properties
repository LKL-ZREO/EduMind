# ==================== 基础配置 ====================
spring.application.name=demo
server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev,local}

# ==================== PostgreSQL ====================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/postgres
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS}

spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ==================== Flyway 数据库迁移 ====================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# 生产环境不要开 baseline-on-migrate，让 Flyway 从头执行所有迁移
# 本地已有数据的库请在 application-local.properties 中覆盖此配置

# ==================== MyBatis-Plus ====================
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.type-aliases-package=com.firedemo.demo.Entity

# ==================== JWT ====================
# 生产环境必须设置 JWT_SECRET 环境变量，生成方式: openssl rand -base64 32
jwt.secret=${JWT_SECRET}

# ==================== 文件上传 ====================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==================== OpenClaw Gateway ====================
langchain4j.openai.base-url=${OPENCLAW_BASE_URL:http://localhost:18789/v1}
langchain4j.openai.api-key=${OPENCLAW_API_KEY}
langchain4j.openai.temperature=0.2
langchain4j.openai.timeout=300s

# OpenClaw Agent 路由
openclaw.agent.default=jarvis
openclaw.agent.mapping.1=jarvis
openclaw.agent.mapping.2=main

# MCP 服务间认证密钥（OpenClaw 调用 /mcp 时通过 X-MCP-API-Key 传入）
mcp.api-key=${MCP_API_KEY}

# ==================== 虚拟线程 ====================
spring.threads.virtual.enabled=true
spring.mvc.async.request-timeout=300000

# ==================== Redis ====================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=0

# ==================== 文件存储 ====================
# storage.type=local  使用本地磁盘（默认，开发环境）
# storage.type=s3     使用 S3 对象存储（生产环境，兼容 MinIO/OSS/COS）
storage.type=${STORAGE_TYPE:local}
storage.upload-dir=${user.home}/.homework-grader/uploads

# ==================== S3 对象存储（MinIO / OSS / COS / AWS） ====================
storage.s3.endpoint=${S3_ENDPOINT:}
storage.s3.region=${S3_REGION:us-east-1}
storage.s3.bucket=${S3_BUCKET:}
storage.s3.access-key=${S3_ACCESS_KEY:}
storage.s3.secret-key=${S3_SECRET_KEY:}
storage.s3.path-style-enabled=${S3_PATH_STYLE:true}


app.ai.reranker.model-dir=${AI_MODEL_DIR:E:/bge-reranker-base/dir}


springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
knife4j.enable=true


rate-limit.anonymous-default.capacity=30
rate-limit.anonymous-default.refill-per-minute=20
rate-limit.authenticated-default.capacity=60
rate-limit.authenticated-default.refill-per-minute=40
rate-limit.rules[/api/homework/submit].capacity=5
rate-limit.rules[/api/homework/submit].refill-per-minute=3
rate-limit.rules[/api/dashboard/].capacity=60
rate-limit.rules[/api/dashboard/].refill-per-minute=30
rate-limit.rules[/api/rag/].capacity=30
rate-limit.rules[/api/rag/].refill-per-minute=15
rate-limit.rules[/api/chat/].capacity=40
rate-limit.rules[/api/chat/].refill-per-minute=20

# ==================== OneBot (QQ Bot) ====================
onebot.http.url=${ONEBOT_HTTP_URL:http://127.0.0.1:3000}
onebot.http.token=${ONEBOT_TOKEN}

# ==================== 优雅关闭 ====================
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ==================== Actuator 健康检查 ====================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=true

# ==================== Resilience4j 熔断 ====================
# AI 服务熔断 — 连续失败过半时自动熔断，30s 后半开试探
resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.openclaw.base-config=default
# 事件缓冲区（供 Actuator 查询）
resilience4j.circuitbreaker.instances.openclaw.event-consumer-buffer-size=100
