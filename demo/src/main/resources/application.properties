# ????
spring.application.name=demo
server.port=8080

# PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=123456


spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# MyBatis-Plus ??
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.firedemo.demo.Entity

# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Spring AI 2.0 - OpenClaw Gateway
spring.ai.openai.base-url=http://localhost:18789
spring.ai.openai.api-key=d442f6bab50df4fbf15e79690eef37ade336b2aeb34c469a
spring.ai.openai.chat.options.model=openclaw/default
spring.ai.openai.chat.options.temperature=0.2

# OpenClaw Agent id
openclaw.agent.default=jarvis
openclaw.agent.mapping.1=jarvis
openclaw.agent.mapping.2=main

#
spring.threads.virtual.enabled=true

# Spring MVC Async Timeout (5 minutes)
spring.mvc.async.request-timeout=300000

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0

# Storage
storage.upload-dir=${user.home}/.homework-grader/uploads
logging.level.org.springframework.security=DEBUG

# Swagger/Knife4j
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
knife4j.enable=true


rate-limit.anonymous-default.capacity=30
rate-limit.anonymous-default.refill-per-minute=20
rate-limit.authenticated-default.capacity=60
rate-limit.authenticated-default.refill-per-minute=40
rate-limit.rules[/api/homework/submit].capacity=5
rate-limit.rules[/api/homework/submit].refill-per-minute=3
rate-limit.rules[/api/dashboard/].capacity=60
rate-limit.rules[/api/dashboard/].refill-per-minute=30
rate-limit.rules[/api/rag/].capacity=30
rate-limit.rules[/api/rag/].refill-per-minute=15
rate-limit.rules[/api/chat/].capacity=40
rate-limit.rules[/api/chat/].refill-per-minute=20

# OneBot Napcat HTTP
onebot.http.url=http://127.0.0.1:3000
onebot.http.token=abc111